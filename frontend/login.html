<!DOCTYPE html>

<html>
<head>
    <title>Login</title>

```
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #43cea2, #185a9d);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .card {
        background: #fff;
        width: 350px;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
        transition: 0.3s;
    }

    input:focus {
        border-color: #43cea2;
        box-shadow: 0 0 5px rgba(67,206,162,0.5);
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        background: #43cea2;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #2ebf91;
    }

    #message {
        margin-top: 15px;
        font-weight: bold;
    }

    .success {
        color: green;
    }

    .error {
        color: red;
    }

    a {
        text-decoration: none;
        color: #43cea2;
    }

        margin-top: 15px;
        font-size: 14px;
    }
</style>
```

</head>

<body>

<div class="card">
    <h2>Welcome Back</h2>

```
<form id="loginForm">
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>

    <button type="submit">Login</button>
</form>

<p id="message"></p>

    <div class="link">
        Don't have an account? <a href="signup.html">Signup</a>
    </div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

    <button id="googleLoginBtn" style="background: #fff; color: #555; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20" alt="Google Logo">
        Login with Google
    </button>
```

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch("http://127.0.0.1:8000/login/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        credentials: "include",
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    })
    .then(response => response.json())
    .then(data => {

        let msg = document.getElementById("message");

        // SUCCESS LOGIN
        if(data.message){

            msg.innerText = "✅ Login successful!";
            msg.className = "success";

            // store login state
            localStorage.setItem("isLoggedIn", "true");
            localStorage.setItem("username", document.getElementById("username").value);

            // redirect to dashboard
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1500);

        }
        // ERROR LOGIN
        else {
            msg.innerText = data.error || "❌ Invalid credentials";
            msg.className = "error";
        }
    })
    .catch(error => {
        document.getElementById("message").innerText = "⚠ Server error";
        document.getElementById("message").className = "error";
    });

});
    
document.getElementById("googleLoginBtn").addEventListener("click", function() {
    fetch("http://127.0.0.1:8000/auth/google/")
    .then(response => response.json())
    .then(data => {
        if(data.auth_url) {
            window.location.href = data.auth_url;
        }
    })
    .catch(error => {
        console.error("Error fetching Google auth URL:", error);
        alert("Failed to initialize Google Login");
    });
});
</script>

</body>
</html>
